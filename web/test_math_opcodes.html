<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-8 Math Opcodes Tests</title>
    <style>
        body {
            background: #111;
            color: #0f0;
            font-family: monospace;
            padding: 24px;
            line-height: 1.4;
        }
        
        h1 {
            color: #0ff;
            font-size: 1.5em;
            margin-bottom: 20px;
            border-bottom: 2px solid #0ff;
            padding-bottom: 10px;
        }
        
        #results {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 1000px;
            padding: 15px;
            background: #000;
            border: 1px solid #0f0;
            border-radius: 4px;
        }
        
        .test-result {
            padding: 6px 10px;
            font-size: 0.95em;
            background: #0a0a0a;
            border-left: 3px solid #666;
        }
        
        .test-result.pass {
            color: #8f8;
            border-left-color: #0f0;
        }
        
        .test-result.fail {
            color: #f88;
            border-left-color: #f00;
        }
        
        .test-result.section {
            color: #0ff;
            border-left-color: #0ff;
            font-weight: bold;
            background: #0a1a1a;
            margin-top: 8px;
            margin-bottom: 2px;
        }
        
        #run-button {
            padding: 10px 20px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        #run-button:hover {
            background: #0ff;
            color: #000;
        }
        
        #run-button:active {
            background: #0a0;
        }
    </style>
</head>
<body>
    <h1>🧮 CHIP-8 Math Opcodes Test Suite</h1>
    <p style="color: #888; margin-bottom: 20px;">
        Tests for MUL, DIV, REM, and LD Vx, [address] instructions
    </p>
    
    <button id="run-button">▶ Run Tests</button>
    
    <div id="results"></div>

    <script type="module">
        import { runMathOpcodeTests } from './js/test_math_opcodes.js';
        
        document.getElementById('run-button').addEventListener('click', () => {
            // Clear previous results
            document.getElementById('results').innerHTML = '';
            
            // Run tests
            try {
                runMathOpcodeTests();
            } catch (error) {
                console.error('Test execution failed:', error);
            }
        });
        
        // Auto-run tests on page load
        window.addEventListener('load', () => {
            // Small delay to ensure DOM is ready
            setTimeout(() => {
                runMathOpcodeTests();
            }, 100);
        });
    </script>
</body>
</html>
