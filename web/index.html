<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-8</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <h1>CHIP-8 WASM</h1>
    <div id="app-grid">
        <div id="screens-row">
            <div id="display-panel">
                <canvas id="display" width="64" height="32"></canvas>
            </div>
            <div id="memory-panel">
                <canvas id="memory-map-canvas"></canvas>
                <div id="mem-info">Addr: 0x000 | Val: 0x00 (0)</div>
            </div>
        </div>
        <div id="tools-row">
            <div id="debug-panel"></div>
            <div id="editor-container">
            <div class="editor-wrapper">
                <div id="line-numbers"></div>
                <textarea id="asm-editor" spellcheck="false"></textarea>
            </div>
            <button id="run-button">Compile & Run</button>
        </div>
        </div>
    </div>
    <script src="./js/chip8.js"></script>
    <script type="module" src="./js/asm.js"></script>
    <script type="module" src="./js/index.js"></script>
</body>

</html>
