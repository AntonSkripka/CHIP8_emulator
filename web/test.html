<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-8 SPD Tests</title>
    <style>
        body {
            background: #111;
            color: #0f0;
            font-family: monospace;
            padding: 24px;
        }
        #results {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 800px;
            margin-bottom: 20px;
        }
        #stack-panel {
            display: block;
            margin-top: 20px;
        }
        #stack-container {
            max-width: 320px;
            min-height: 100px;
            border: 1px solid #333;
            padding: 10px;
            background: #000;
            display: flex;
            flex-direction: column-reverse;
            gap: 6px;
        }
        .stack-cell {
            padding: 6px 10px;
            background: #0f0;
            color: #000;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <h1>CHIP-8 SPD Test Suite</h1>
    <div id="results"></div>

    <canvas id="display" width="64" height="32" style="display:none"></canvas>
    <canvas id="memory-map-canvas" width="640" height="640" style="display:none"></canvas>
    <div id="debug-panel" style="display:none"></div>
    <div id="stack-panel" style="display:none">
        <div class="panel-header">SPD Stack</div>
        <div id="stack-container"></div>
    </div>

    <script src="./js/chip8.js"></script>
    <script type="module" src="./js/tests.js"></script>
</body>
</html>
